name: Restore index.html

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/restore-index.yml'
      - 'scripts/patch_header.py'

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Restore index.html from good commit
        run: |
          git checkout f8b624b7edd7932a08c8d0c8fe86d03f55b464fd -- index.html
          python3 scripts/patch_header.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'fix: restore full index.html'
          file_pattern: index.html
